<div class="contact-container">
  <div class="contact-card">

    <div class="contact-photo-wrapper">
      <img src="/cutme.png" [attr.alt]="'RAMA_AL_MOMANI' | translate" class="contact-photo" />
    </div>

    <div class="contact-text">
      <h2>{{ 'CONTACT_SECTION.TITLE' | translate }}</h2>
      <p>{{ 'CONTACT_SECTION.DESCRIPTION' | translate }}</p>

      <a class="email-badge" href="mailto:{{ 'CONTACT_SECTION.EMAIL' | translate }}">
        <svg viewBox="0 0 24 24" class="icon"><path d="M2 4h20v16H2V4zm2 2v.01L12 12l8-5.99V6H4zm16 2.24-7.4 5.55a1 1 0 0 1-1.2 0L4 8.24V18h16V8.24z" /></svg>
        {{ 'CONTACT_SECTION.EMAIL' | translate }}
      </a>
    </div>

  </div>

  <div class="social-row">
    <a [href]="'CONTACT_SECTION.LINKEDIN' | translate" target="_blank" rel="noopener" class="social-icon linkedin" aria-label="LinkedIn">
      <svg viewBox="0 0 24 24"><path d="M4.98 3.5C4.98 4.88 3.86 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V23h-4V8zm7 0h3.83v2.05h.05c.53-1 1.84-2.05 3.79-2.05C19.5 8 21 10.4 21 14.14V23h-4v-8c0-1.9-.03-4.35-2.65-4.35-2.65 0-3.05 2.07-3.05 4.21V23h-4V8z" /></svg>
    </a>
    <a [href]="'CONTACT_SECTION.GITHUB' | translate" target="_blank" rel="noopener" class="social-icon github" aria-label="GitHub">
      <svg viewBox="0 0 24 24"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.8.1-.8.1-.8 1.2.1 1.9 1.2 1.9 1.2 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6a4.6 4.6 0 0 1 1.2-3.2 4.3 4.3 0 0 1 .1-3.2s1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2a4.3 4.3 0 0 1 .1 3.2 4.6 4.6 0 0 1 1.2 3.2c0 4.7-2.8 5.7-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3z" /></svg>
    </a>
    <a [href]="'CONTACT_SECTION.FACEBOOK' | translate" target="_blank" rel="noopener" class="social-icon facebook" aria-label="Facebook">
      <svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z" /></svg>
    </a>
    <a [href]="'CONTACT_SECTION.YOUTUBE' | translate" target="_blank" rel="noopener" class="social-icon youtube" aria-label="YouTube">
      <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.5V8.5l6.3 3.5-6.3 3.5z" /></svg>
    </a>
  </div>
</div>
